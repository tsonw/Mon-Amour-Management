<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="stylesheet" href="./styles/style.css">
        <link rel="icon" href="./assets/iconMA.png" type="image/png">
        <title>Authentication | Mon Amour</title>
    </head>
    <body>
        <div class="login">
            <form action="/login" method="post">
                <img src="./assets/logoMonAmour.png" alt="logoMonAmour">
                <div class="login-box">
                    <div class="input-box">
                        <input type="text" class="input-feild" id="username" name="username" placeholder="" required>
                        <label class="label" for="username">Username</label>
                    </div>
                    <div class="input-box">
                        <input type="password" class="input-feild" id="password" name="password" placeholder="" required>    
                        <label class="label" for="password">Password</label>
                    </div>
                    <button id="login-button">Login</button>
                </div>
                <p>Don't have an account ?</p><br>
                <a href="./pages/request-create-acc.html">Request to create account here</a>
            </form>
        </div>
    </body>
    <script type="module">
        import { mySignInWithEmailAndPassword } from './scripts/auth-signin.js';

        document.getElementById('login-button').addEventListener('click', (event) => {
            event.preventDefault();
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            console.log(username, password);
            mySignInWithEmailAndPassword(username, password);
        });
    </script>
</html>
